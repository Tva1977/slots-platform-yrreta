<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin - Leads</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
td, th { border:1px solid #333; padding:10px; }
button { padding:10px; margin-top:10px; }
</style>

</head>
<body>

<h1>📊 Leads Capturados</h1>

<button onclick="carregar()">🔄 Atualizar</button>

<table>
<thead>
<tr>
<th>Contato</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
function carregar(){
    fetch("http://192.168.3.10:3000/leads")
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.reverse().forEach(l => {
            html += "<tr><td>"+l.contato+"</td><td>"+l.data+"</td></tr>";
        });
        document.getElementById("tabela").innerHTML = html;
    });
}

setInterval(carregar, 3000);
carregar();
</script>

<h2>➕ Adicionar Plataforma</h2>

<input id="nome" placeholder="Nome da plataforma"><br>
<input id="url" placeholder="Link da plataforma"><br>
<button onclick="addLink()">Adicionar</button>

<script>
function addLink(){
    let nome = document.getElementById("nome").value;
    let url = document.getElementById("url").value;

    fetch("http://192.168.3.10:3000/add-link", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({nome, url})
    });

    alert("Link adicionado!");
}
</script></body>
</html>
