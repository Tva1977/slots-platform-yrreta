<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Slots Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>?? Plataforma Slots Ativa</h1>
<p>FaÓa seu cadastro para liberar acesso</p>

<input type="text" placeholder="Nome" id="nome"><br><br>
<input type="text" placeholder="WhatsApp" id="contato"><br><br>
<input type="email" placeholder="Email" id="email"><br><br>

<button onclick="cadastrar()">Cadastrar</button>

<script>
async function cadastrar() {
    const nome = document.getElementById('nome').value;
    const contato = document.getElementById('contato').value;
    const email = document.getElementById('email').value;

    console.log("clicou no botÐo");

    try {
        await fetch('/cadastro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome, contato, email })
        });
    } catch (e) {
        console.log("erro no fetch");
    }

    // ?? FORúA REDIRECIONAMENTO (independente de erro)
    window.location.href = '/ofertas.html';
}
</script>

</body>
</html>
