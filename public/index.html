<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Slots Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>?? Plataforma Slots Ativa</h1>
    <p>Cadastro funcionando com sucesso!</p>

    <form onsubmit='cadastrar(event)' id="form">
        <input type="text" placeholder="Nome" id="nome" required><br><br>
        <input type="text" placeholder="WhatsApp" id="contato" required><br><br>
        <input type="email" placeholder="Email" id="email" required><br><br>
        <button type="submit">Cadastrar</button>
    </form>

    
<script>
async function cadastrar(event) {
    event.preventDefault();

    const nome = document.getElementById('nome').value;
    const contato = document.getElementById('contato').value;
    const email = document.getElementById('email').value;

    const res = await fetch('/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, contato, email })
    });

    if (res.ok) {
        window.location.href = '/ofertas.html';
    } else {
        alert('Erro ao cadastrar');
    }
}
</script></body>
</html>
