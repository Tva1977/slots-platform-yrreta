<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Slots Platform</title>
</head>

<body style="background:#111;color:#fff;text-align:center;font-family:Arial;">

<h1>🔥 Plataforma Slots</h1>
<p>Preencha para liberar acesso</p>

<input id="nome" placeholder="Nome"><br><br>
<input id="contato" placeholder="WhatsApp"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="entrar()">ENTRAR</button>

<script>
function entrar() {

    // 🔥 ENVIA DADOS (SEM ESPERAR)
    fetch('/leads', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            nome: document.getElementById('nome').value,
            contato: document.getElementById('contato').value,
            email: document.getElementById('email').value
        })
    }).catch(() => {});

    // 🚀 REDIRECIONA NA HORA (GARANTIDO)
    window.location.href = 'https://slots-platform-yrreta.onrender.com/ofertas.html';
}
</script>

</body>
</html>
