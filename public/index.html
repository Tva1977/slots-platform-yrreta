<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Slots Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🎰 Plataforma Slots Ativa</h1>
    <p>Faça seu cadastro para liberar o acesso</p>

    <form id="form">
        <input type="text" placeholder="Nome" id="nome" required><br><br>
        <input type="text" placeholder="WhatsApp" id="contato" required><br><br>
        <input type="email" placeholder="Email" id="email" required><br><br>
        <button type="submit">Cadastrar</button>
    </form>

    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                nome: document.getElementById('nome').value,
                contato: document.getElementById('contato').value,
                email: document.getElementById('email').value
            };

            try {
                const res = await fetch('/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    window.location.href = 'https://slots-platform-yrreta.onrender.com/ofertas.html';
                } else {
                    alert('Erro ao cadastrar');
                }
            } catch (err) {
                alert('Erro de conexão');
                console.error(err);
            }
        });
    </script>
</body>
</html>
