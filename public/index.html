<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DEBUG YRRETA</title>
</head>

<body style="background:#000;color:#0f0;text-align:center;font-family:Arial">

<h1>🧪 MODO DEBUG</h1>

<input id="nome" placeholder="Nome"><br><br>
<input id="contato" placeholder="WhatsApp"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="enviar()">TESTAR</button>

<p id="status">Status: aguardando...</p>

<script>
async function enviar() {
    const status = document.getElementById('status');

    try {
        status.innerText = "Enviando...";

        const res = await fetch('/leads', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                nome: document.getElementById('nome').value,
                contato: document.getElementById('contato').value,
                email: document.getElementById('email').value
            })
        });

        status.innerText = "Resposta recebida: " + res.status;

        const texto = await res.text();
        status.innerText += " | " + texto;

        if (res.ok) {
            status.innerText += " | REDIRECIONANDO...";
            setTimeout(() => {
                window.location.href = '/ofertas.html';
            }, 2000);
        }

    } catch (e) {
        status.innerText = "ERRO: " + e.message;
    }
}
</script>

</body>
</html>
